<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chez Louisa — Pizzeria & Bar à Vins · Fort-de-France</title>
<meta name="description" content="Chez Louisa — Pizzas de qualité, Bar à Vins et beaucoup d'amour ! Au cœur de la Rue Colorée, Fort-de-France, Martinique." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Serif+Display:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:    "rgb(var(--ink) / <alpha-value>)",
          panel:  "rgb(var(--panel) / <alpha-value>)",
          cream:  "rgb(var(--cream) / <alpha-value>)",
          muted:  "rgb(var(--muted) / <alpha-value>)",
          red:    "rgb(var(--red) / <alpha-value>)",
          pink:   "rgb(var(--pink) / <alpha-value>)",
          blue:   "rgb(var(--blue) / <alpha-value>)",
          green:  "rgb(var(--green) / <alpha-value>)",
          line:   "rgb(var(--cream) / 0.12)",
        },
        fontFamily: {
          display: ['"Abril Fatface"', '"DM Serif Display"', 'serif'],
          serif:   ['"DM Serif Display"', 'serif'],
          body:    ['"Hanken Grotesk"', 'system-ui', 'sans-serif'],
          script:  ['"Caveat"', 'cursive'],
          mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        boxShadow: {
          "glow-red":  "0 14px 44px -12px rgb(var(--red) / 0.55)",
          "glow-pink": "0 14px 44px -12px rgb(var(--pink) / 0.55)",
          "glow-blue": "0 14px 44px -12px rgb(var(--blue) / 0.55)",
        },
      },
    },
  };
</script>

<style>
  :root {
    /* Note : --ink est utilisé partout comme "couleur de contraste" et --cream comme "couleur de texte/sombre".
       Dans ce thème clair on les inverse — ink devient crème clair, cream devient l'encre sombre. */
    --ink: 248 235 220;        /* crème chaude (fond) */
    --panel: 246 219 211;      /* rose pâle saumon (surface) */
    --cream: 36 22 21;         /* encre très sombre (texte) */
    --muted: 138 91 84;        /* brun rosaceux (texte secondaire) */
    --red: 211 47 56;          /* rouge cerise brand */
    --pink: 240 154 158;       /* rose saumon brand */
    --blue: 38 92 168;         /* bleu profond (accent secondaire conservé) */
    --green: 29 74 42;         /* vert forêt brand */
    --paper: 248 235 220;      /* alias pour le fond */
  }
  /* Variantes via Tweaks */
  [data-mood="creamy"]  { --ink: 250 240 226; --panel: 244 220 210; }
  [data-mood="sunset"]  { --ink: 250 220 200; --panel: 244 196 184; }
  [data-mood="rosa"]    { --ink: 246 204 204; --panel: 234 175 178; }
  [data-pal="classic"]  { --red: 211 47 56; --pink: 240 154 158; --green: 29 74 42; }
  [data-pal="punchy"]   { --red: 230 32 48; --pink: 255 130 140; --green: 22 88 44; }
  [data-pal="olive"]    { --red: 195 56 56; --pink: 232 165 165; --green: 60 90 35; }

  html { scroll-behavior: smooth; }
  body {
    font-family: '"Hanken Grotesk"', system-ui, sans-serif;
    background: rgb(var(--ink)) !important;
    color: rgb(var(--cream));
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* (1) Texture papier kraft : grain subtil + fibre */
    background-image:
      radial-gradient(rgb(140 90 60 / 0.08) 1px, transparent 1px),
      radial-gradient(rgb(180 110 80 / 0.05) 1px, transparent 1px),
      repeating-linear-gradient(
        37deg,
        rgb(190 120 90 / 0.02) 0 2px,
        transparent 2px 5px
      );
    background-size: 4px 4px, 9px 9px, auto;
    background-attachment: fixed;
  }
  ::selection { background: rgb(var(--red) / 0.85); color: rgb(var(--ink)); }

  /* Rayures brand rouge/rose (style cabine, légère inclinaison) */
  .stripes-rouge {
    background: repeating-linear-gradient(
      90deg,
      rgb(var(--red)) 0 28px,
      rgb(var(--pink)) 28px 56px
    );
  }
  .stripes-soft {
    background: repeating-linear-gradient(
      90deg,
      rgb(var(--pink)) 0 24px,
      rgb(var(--ink)) 24px 48px
    );
  }
  .stripes-diag {
    background: repeating-linear-gradient(
      135deg,
      rgb(var(--red)) 0 16px,
      rgb(var(--pink)) 16px 32px
    );
  }
  /* Grain papier subtil */
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgb(var(--cream) / 0.08) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: multiply; opacity: .35;
  }

  /* Placeholder image rayé */
  .placeholder-stripes {
    background:
      repeating-linear-gradient(135deg, rgb(var(--cream)/0.06) 0 12px, transparent 12px 24px),
      rgb(var(--panel));
  }

  /* (2) Apparition au scroll avec rotation : style "déposé sur la table" */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
  .reveal-in { opacity: 1; transform: none; }

  .reveal-tilt { opacity: 0; transform: translateY(32px) rotate(-6deg) scale(.94); transition: opacity .8s cubic-bezier(.22,.61,.36,1), transform 1s cubic-bezier(.22,.61,.36,1); }
  .reveal-tilt.reveal-in { opacity: 1; transform: none; }

  .reveal-tilt-r { opacity: 0; transform: translateY(32px) rotate(7deg) scale(.94); transition: opacity .8s cubic-bezier(.22,.61,.36,1), transform 1s cubic-bezier(.22,.61,.36,1); }
  .reveal-tilt-r.reveal-in { opacity: 1; transform: none; }

  /* (3) Curseur personnalisé pizza sur zones interactives (desktop only) */
  @media (hover: hover) and (pointer: fine) {
    .cursor-pizza {
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'><text y='22' font-size='22'>🍕</text></svg>") 4 4, pointer;
    }
  }

  /* (7) Parallaxe — utilisée pour les bandes d'image immersives */
  .parallax-bg {
    background-attachment: fixed;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
  }
  @supports (-webkit-touch-callout: none) {
    /* iOS ne supporte pas bien fixed → fallback cover statique */
    .parallax-bg { background-attachment: scroll; }
  }

  /* Transition d'onglet */
  @keyframes pageEnter { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .page-enter { animation: pageEnter .55s cubic-bezier(.22,.61,.36,1) both; }

  @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .toast-in { animation: toastIn .35s ease both; }

  @keyframes modalPop { from { opacity: 0; transform: translateY(18px) scale(.96); } to { opacity: 1; transform: none; } }
  .modal-pop { animation: modalPop .35s cubic-bezier(.22,.61,.36,1) both; }

  /* ── Inversion thème : section rouge brand au milieu de l'accueil ── */
  .theme-red {
    /* Fond rouge brand, texte crème/blanc/rose */
    --ink: var(--red);            /* le "fond" devient rouge brand */
    --panel: 168 28 38;           /* surface rouge plus foncé */
    --cream: 255 255 255;         /* texte principal blanc */
    --muted: 250 230 232;         /* texte secondaire rose très pâle */
    background: rgb(var(--red));
    color: rgb(255 255 255);
  }
  /* Bordures : on garde leur valeur claire (line = cream/12) */

  /* Transitions douces fond clair → rouge → clair */
  .grad-to-red {
    height: 140px;
    background: linear-gradient(to bottom,
      rgb(248 235 220 / 1),
      rgb(var(--red) / 1)
    );
  }
  .grad-from-red {
    height: 140px;
    background: linear-gradient(to bottom,
      rgb(var(--red) / 1),
      rgb(248 235 220 / 1)
    );
  }

  .hover-zoom img { transition: transform 1.1s cubic-bezier(.22,.61,.36,1); }
  .hover-zoom:hover img { transform: scale(1.07); }

  /* ── Tweaks : Énergie graphique ─────────────────────────────────
     Calme : on enlève rayures et stickers, halos très discrets.
     Brand : valeur par défaut.
     Pop   : tout amplifié — rayures plus épaisses, stickers plus gros, halos saturés. */
  :root { --deco-stripes: 1; --deco-halo: 1; --deco-sticker: 1; --deco-sticker-scale: 1; }
  [data-energy="calme"] { --deco-stripes: 0; --deco-halo: 0.35; --deco-sticker: 0; --deco-sticker-scale: 0.7; }
  [data-energy="pop"]   { --deco-stripes: 1.15; --deco-halo: 1.6; --deco-sticker: 1; --deco-sticker-scale: 1.15; }

  .stripes-rouge, .stripes-diag, .stripes-soft {
    opacity: var(--deco-stripes); transition: opacity .35s ease;
  }
  .deco-halo { opacity: var(--deco-halo); transition: opacity .4s ease; }
  .deco-sticker {
    opacity: var(--deco-sticker);
    scale: var(--deco-sticker-scale);
    transition: opacity .35s ease, scale .35s cubic-bezier(.22,.61,.36,1);
  }
  /* Le Pop rend aussi les rayures plus épaisses */
  [data-energy="pop"] .stripes-rouge { background-size: auto; }
  [data-energy="pop"] .stripes-rouge,
  [data-energy="pop"] .stripes-soft   { height: 18px !important; }
  [data-energy="calme"] .stripes-rouge,
  [data-energy="calme"] .stripes-soft { height: 1px !important; }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    .page-enter { animation: none !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body style="background-color: rgb(255, 255, 255)">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/layout.jsx"></script>
  <script type="text/babel" src="src/home.jsx"></script>
  <script type="text/babel" src="src/carte.jsx"></script>
  <script type="text/babel" src="src/coupe.jsx"></script>
  <script type="text/babel" src="src/contact.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
